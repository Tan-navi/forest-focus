<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Focus | To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🌿 Forest Focus</h1>

        <p class="subtitle">
            Stay focused, one task at a time.
        </p>

        <div class="input-section">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter a new task..."
            >

            <button id="addBtn">
                Add Task
            </button>

        </div>

        <p id="taskCount">
            0 Tasks Remaining
        </p>

        <p id="emptyMessage">
            🌱 No tasks yet. Start by adding your first goal!
        </p>

        <ul id="taskList"></ul>

    </div>

    <script src="script.js"></script>

</body>

</html>
